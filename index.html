<section id="experience" class="xp-content">
  <div class="container">
    <div class="page-header">
      <h1>Experience Signals</h1>
      <p>The work I've done spans across Product Ownership, Consulting, Product and UI/UX Design, a B2C venture, Operations and SEO.</p>
    </div>

    <div class="tl-scene" id="tlScene">
      <div class="tl-line"></div>
    </div>
  </div>
</section>

<script src="common.js"></script>
<script>
(function () {
  var stops = [
    { label: 'May 2026', title: 'Apprentice - Product Ownership', href: 'product.html' },
    { label: 'Apr - June 2026', title: 'Intern - Technical Consulting', href: 'consulting.html' },
    { label: 'July - Sept 2025', title: 'Intern: UI/UX Design', href: 'uiux.html' },
    {
      label: '2024-25',
      title: 'Operations Management via<br>VP @ Uni SDG Cell<br>Ops Head @ Special Olympics<br>R&D @ Uni Placements Cell<br>Rep @ Uni Student Council',
      href: 'newsletter.html'
    },
    { label: 'Oct - Dec 2023', title: 'Intern: SEO Analysis', href: 'seo.html' }
  ];

  var scene = document.getElementById('tlScene');

  stops.forEach(function (s) {
    var stop = document.createElement('div');
    stop.className = 'tl-stop';

    var dot = document.createElement('div');
    dot.className = 'tl-dot';

    var lbl = document.createElement('div');
    lbl.className = 'tl-label';

    var name = document.createElement('span');
    name.className = 'tl-label-name';
    name.textContent = s.label;

    var sub = document.createElement('span');
    sub.className = 'tl-label-sub';

    var link = document.createElement('a');
    link.href = s.href;
    link.innerHTML = s.title;

    sub.appendChild(link);

    lbl.appendChild(name);
    lbl.appendChild(sub);

    stop.appendChild(dot);
    stop.appendChild(lbl);

    scene.appendChild(stop);
  });

  function trimLine() {
    var dots = document.querySelectorAll('.tl-dot');
    if (dots.length < 2) return;

    var line = document.querySelector('.tl-line');
    if (!line) return;

    var first = dots[0].getBoundingClientRect();
    var last = dots[dots.length - 1].getBoundingClientRect();
    var sRect = scene.getBoundingClientRect();

    line.style.top =
      Math.round(first.top - sRect.top + first.height / 2) + 'px';

    line.style.bottom =
      Math.round(sRect.bottom - (last.top + last.height / 2)) + 'px';
  }

  requestAnimationFrame(trimLine);
  window.addEventListener('resize', trimLine);
})();
</script>
