  <script src="common.js"></script>
  <script>
    const projects = [
      {
        title: 'RAISEit',
        tagline: 'A real-time auction engine with structured fundraising workflows, designed for transparent competitive bidding at scale.',
        slug: 'raiseit',
        domain: 'Events / Fundraising',
        techs: ['Next.js', 'React', 'Tailwind CSS', 'Node.js', 'REST APIs', 'WebSockets', 'MongoDB', 'JWT']
      },
      {
        title: 'Property Management System (PMS)',
        tagline: 'A full-stack Property Management System built from scratch — covering rooms, dining, billing, inventory, payroll, and analytics for independent hospitality businesses.',
        slug: 'pms',
        domain: 'Hospitality / SaaS',
        techs: ['Java 21', 'Spring Boot 3.5', 'PostgreSQL', 'Flyway', 'JWT', 'Swagger', 'JUnit 5', 'Testcontainers']
      },
      {
        title: 'My Hood',
        tagline: 'A neighbourhood-first platform connecting residents through local discovery, community updates, and shared civic participation.',
        slug: 'myhood',
        domain: 'Community',
        techs: ['HTML', 'CSS', 'JavaScript']
      },
      {
        title: 'Vibranium',
        tagline: 'AI-powered SaaS product intelligence workspace with market analysis, competitor discovery, and strategic insights.',
        slug: 'vibranium',
        domain: 'SaaS / AI',
        techs: ['React 18', 'Vite', 'Tailwind CSS', 'Framer Motion', 'Recharts', 'Firebase Auth', 'Firestore', 'FastAPI']
      },
      {
        title: 'Email Automation System (RPA)',
        tagline: 'A UiPath-based RPA solution that eliminates repetitive email workflows for university administrative staff managing 22 student clubs.',
        slug: 'email-automation',
        domain: 'Workflow Automation',
        techs: ['UiPath', 'Google Sheets', 'Gmail']
      },
      {
        title: 'Retail AI Platform',
        tagline: 'Real-time analytics platform for retail environments using computer vision, LLMs, and AI-powered multi-agent insights.',
        slug: 'retail-ai-platform',
        domain: 'AI / Retail',
        techs: ['Python', 'Angular', 'PostgreSQL', 'FastAPI', 'YOLOv8', 'OpenCV', 'Ollama LLM', 'Multi-Agent']
      }
    ];

    function renderProjects() {
      const grid = document.getElementById('projectsGrid');
      grid.innerHTML = projects.map(p => `
        <a class="project-card" href="projects/${p.slug}.html">
          <div class="project-card-header">
            <span class="project-domain">${p.domain}</span>
          </div>
          <h3 class="project-card-title">${p.title}</h3>
          <p class="project-card-tagline">${p.tagline}</p>
          <div class="project-card-meta">${p.techs.slice(0,4).map(t => `<span class="tech-tag">${t}</span>`).join('')}</div>
        </a>
      `).join('');
    }

    renderProjects();
  </script>
